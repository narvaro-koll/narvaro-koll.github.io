<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Digital Närvaro - Start</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8 !important; }
        .text-kungsbla { color: #0284c7 !important; }
        .btn-vinrod {
            background-color: #881337 !important;
            border-color: #881337 !important;
            color: white !important;
        }
        .btn-vinrod:hover {
            background-color: #6b0d2b !important;
            border-color: #6b0d2b !important;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="card shadow p-4 text-center" style="max-width: 500px; width: 100%; border-radius: 16px; border: none;">
        <div class="fs-1 mb-2">🏫</div>
        <h1 class="h3 mb-3 fw-bold text-kungsbla">Digital Närvaro</h1>
        <p class="text-muted mb-4">Ange sal eller kursnamn för att starta en ny närvaroregistrering.</p>
        
        <form action="/skapa-rum" method="post" class="text-start">
            <div class="mb-3">
                <label class="form-label fw-semibold text-secondary">Klassrum / Kurs</label>
                <input type="text" name="room_id" class="form-control form-control-lg" placeholder="Ex: Stenbeck, Hi1b" required style="border-radius: 8px;">
            </div>
            <button type="submit" class="btn btn-vinrod btn-lg w-100 fw-bold py-3" style="border-radius: 10px;">Skapa digitalt klassrum</button>
        </form>
    </div>
</body>
</html>
