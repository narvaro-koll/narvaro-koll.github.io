<form action="/spara/{{ room_id }}" method="post" class="text-start">
    <input type="hidden" name="lat" id="lat_input" value="">
    <input type="hidden" name="lon" id="lon_input" value="">

    <div class="mb-3">
        <label class="form-label fw-semibold text-secondary">Inloggad som</label>
        <input type="text" class="form-control form-control-lg bg-light text-muted" value="{{ session.user_name }}" readonly style="border-radius: 8px;">
    </div>
    
    <div class="mb-4">
        <label class="form-label fw-semibold text-secondary">Välj din klass</label>
        <select name="klass" class="form-select form-select-lg" required style="border-radius: 8px;">
            <option value="" disabled selected>-- Välj i listan --</option>
            <option value="NA1A">NA1A</option>
            <option value="NA1B">NA1B</option>
            <option value="NA1C">NA1C</option>
            <option value="SA1">SA1</option>
            <option value="EK1A">EK1A</option>
            <option value="EK1B">EK1B</option>
            <option value="EK1C">EK1C</option>
            <option value="NA2A">NA2A</option>
            <option value="NA2B">NA2B</option>
            <option value="NA2C">NA2C</option>
            <option value="SA2">SA2</option>
            <option value="EK2A">EK2A</option>
            <option value="EK2B">EK2B</option>
            <option value="EK2C">EK2C</option>
            <option value="NA3A">NA3A</option>
            <option value="NA3B">NA3B</option>
            <option value="NA3C">NA3C</option>
            <option value="SA3">SA3</option>
            <option value="EK3A">EK3A</option>
            <option value="EK3B">EK3B</option>
            <option value="EK3C">EK3C</option>
        </select>
    </div>
    
    <div id="gps-status" class="mb-3 text-center text-primary fw-bold small">
        🔄 Söker efter din plats...
    </div>
    
    <button type="submit" id="submit-btn" class="btn btn-vinrod btn-lg w-100 fw-bold py-3" style="border-radius: 10px;" disabled>Bekräfta närvaro ✅</button>
</form>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const btn = document.getElementById("submit-btn");
        const statusText = document.getElementById("gps-status");
        const latInput = document.getElementById("lat_input");
        const lonInput = document.getElementById("lon_input");

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                // Lyckades! Spara koordinater och lås upp knappen
                latInput.value = position.coords.latitude;
                lonInput.value = position.coords.longitude;
                btn.disabled = false;
                statusText.innerHTML = "📍 Plats hittad. Du kan nu checka in.";
                statusText.className = "mb-3 text-center text-success fw-bold small";
            }, function(error) {
                // Misslyckades (eleven nekade platsinfo eller mobilen hittar ej)
                statusText.innerHTML = "❌ Du måste klicka 'Tillåt' för platsinfo för att checka in.";
                statusText.className = "mb-3 text-center text-danger fw-bold small";
            }, {
                enableHighAccuracy: true // Ber mobilen använda exakt GPS
            });
        } else {
            statusText.innerHTML = "❌ Din webbläsare stöder inte GPS.";
            statusText.className = "mb-3 text-center text-danger fw-bold small";
        }
    });
</script>
