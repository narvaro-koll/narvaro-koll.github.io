<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Elev - Registrering</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8 !important; }
        .text-kungsbla { color: #0284c7 !important; }
        .btn-vinrod {
            background-color: #881337 !important;
            border-color: #881337 !important;
            color: white !important;
        }
        .btn-vinrod:hover {
            background-color: #6b0d2b !important;
            border-color: #6b0d2b !important;
        }
        .card-custom {
            max-width: 450px;
            width: 100%;
            border-radius: 16px;
            border: none;
            border-top: 6px solid #0284c7;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center bg-light" style="min-height: 100vh;">
    <div class="card shadow p-4 text-center" style="max-width: 400px; width: 100%; border-radius: 16px; border: none;">
        <h2 class="h4 mb-4 fw-bold text-kungsbla">Registrera närvaro</h2>
        
        <form action="/spara/{{ room_id }}" method="post" class="text-start">
            <div class="mb-3">
                <label class="form-label fw-semibold text-secondary">Inloggad som</label>
                <input type="text" class="form-control form-control-lg bg-light text-muted" value="{{ session.user_name }}" readonly style="border-radius: 8px;">
            </div>
            
            <div class="mb-4">
                <label class="form-label fw-semibold text-secondary">Välj din klass</label>
                <select name="klass" class="form-select form-select-lg" required style="border-radius: 8px;">
                    <option value="" disabled selected>-- Välj i listan --</option>
                    <option value="NA1A">NA1A</option>
                    <option value="NA1B">NA1B</option>
                    <option value="NA1C">NA1C</option>
                    <option value="SA1">SA1</option>
                    <option value="EK1A">EK1A</option>
                    <option value="EK1B">EK1B</option>
                    <option value="EK1C">EK1C</option>
                    <option value="NA2A">NA2A</option>
                    <option value="NA2B">NA2B</option>
                    <option value="NA2C">NA2C</option>
                    <option value="SA2">SA2</option>
                    <option value="EK2A">EK2A</option>
                    <option value="EK2B">EK2B</option>
                    <option value="EK2C">EK2C</option>
                    <option value="NA3A">NA3A</option>
                    <option value="NA3B">NA3B</option>
                    <option value="NA3C">NA3C</option>
                    <option value="SA3">SA3</option>
                    <option value="EK3A">EK3A</option>
                    <option value="EK3B">EK3B</option>
                    <option value="EK3C">EK3C</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-vinrod btn-lg w-100 fw-bold py-3" style="border-radius: 10px;">Bekräfta närvaro ✅</button>
        </form>
    </div>
</body>
